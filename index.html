<!-- HTML -->
<!DOCTYPE html>
<html lang="zh-tw">
<head>
  <title>登入 iLearn 模仿頁</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <!-- 引入 sql.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
</head>
<body>

<!-- 首頁內容（彈窗關閉後才顯示） -->
<div id="main-content" style="display:none;">
  <!-- 模擬瀏覽器外觀 -->
  <div class="browser-mockup">
    <div class="browser-bar">
      <span class="browser-btn" id="btn-back">◀</span>
      <span class="browser-btn" id="btn-forward">▶</span>
      <span class="browser-btn" id="btn-refresh">⟳</span>
      <input class="browser-url" id="browser-url" value="http://ilearn.fake.edu.tw/login" readonly>
    </div>
  </div>
  <div class="login-wrapper">
    <div class="login-container">
      <div class="left-column">
        <div class="login-logo">
          <img src="img/moodle4_log.jpg" alt="iLearn">
        </div>
        <form class="login-form" action="#" id="fake-login-form">
          <div class="form-group">
            <input type="text" name="username" id="username" placeholder="帳號">
          </div>
          <div class="form-group">
            <input type="password" name="password" id="password" placeholder="密碼">
          </div>
          <button type="submit">登入</button>
        </form>
      </div>
      <div class="right-column">
        <div class="fake-bulletin" id="fake-bulletin">
          <h3>【緊急】NID 密碼異常，請立即登入更換密碼！</h3>
          <p>近期發現大量帳號異常登入，請務必於 24 小時內更換密碼，否則帳號將被鎖定。</p>
        </div>
        <p><strong>請使用 NID 帳號/密碼登入平台。</strong></p>
        <p>
          <strong>欲變更NID密碼，請連結至
            <a href="#" id="nid-link">
              <img src="img/nidlogo.png" alt="NID">
            </a>
          </strong>
        </p>
      </div>
    </div>
    <div class="footer">
      </div>
      <p>Copyright © 2025 iLearn. All rights reserved.</p>
    </div>
  </div>
  <img id="feature-mini" src="test.png" alt="釣魚特徵" style="display:none;position:fixed;bottom:30px;right:30px;z-index:9999;cursor:pointer;width:60px;">
<a id="feature-mini-link" href="phishing_features.html" style="display:none;position:fixed;bottom:30px;right:30px;z-index:10000;">
  <img src="img/test.png" alt="釣魚特徵互動測驗" style="width:60px;">
</a>
</div>
<script src="script.js"></script>
</body>
</html>
